name: Integration

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.1

      - name: golangci-lint run
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
          args: --timeout=5m ./...

      - name: Upload linter reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: linter-reports-${{ github.run_number }}
          path: reports/
          if-no-files-found: ignore

  test:
    name: Test (Go ${{ matrix.go_version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go_version: [1.26.1]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go_version }}

      - name: Install junit-report tool
        run: go install github.com/jstemmer/go-junit-report/v2@latest

      - name: Download Go Modules
        run: go mod tidy

      - name: Run tests (with race detector)
        run: |
          mkdir -p reports
          set -o pipefail
          go test -race -v ./... 2>&1 | tee reports/test.out

      - name: Produce JUnit report
        run: go-junit-report < reports/test.out > reports/xunit.xml

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: test-reports-${{ github.run_number }}
          path: reports/
          if-no-files-found: ignore

  build:
    name: Build (Go ${{ matrix.go_version }})
    runs-on: ubuntu-latest
    needs: [lint, test]
    strategy:
      matrix:
        go_version: [1.26.1]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go_version }}

      - name: Build
        run: go build ./...

  build-image:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: build
    permissions:
      packages: write
    env:
      DOCKER_IMAGE_NAME: ghcr.io/golang-venezuela/adan-bot
    steps:
      - uses: actions/checkout@v5

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image (latest)
        if: github.ref == 'refs/heads/main'
        run: |
          docker build . -t $DOCKER_IMAGE_NAME:latest
          docker push $DOCKER_IMAGE_NAME:latest
